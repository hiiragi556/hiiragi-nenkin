<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小倉院｜障害年金 回答一覧</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f5f2; --surface:#fff; --primary:#3d7a5a; --primary-light:#6aa882;
    --primary-pale:#eaf4ed; --accent:#1e4d35;
    --text:#1a1a1a; --text-secondary:#4a4a4a; --text-light:#777;
    --border:#ddd; --error:#b03030; --radius:10px; --radius-sm:6px;
    --shadow:0 2px 10px rgba(0,0,0,0.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}

  /* ===== ロック画面 ===== */
  #lockScreen{
    position:fixed;inset:0;background:linear-gradient(135deg,#1e4d35 0%,#3d7a5a 60%,#5a9070 100%);
    display:flex;align-items:center;justify-content:center;z-index:9999;
  }
  .lock-box{background:#fff;border-radius:16px;padding:36px 28px;width:90%;max-width:340px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.2);}
  .lock-icon{font-size:36px;margin-bottom:12px;}
  .lock-box h2{font-family:'Noto Serif JP',serif;font-size:18px;color:var(--accent);margin-bottom:4px;}
  .lock-box p{font-size:12px;color:var(--text-light);margin-bottom:20px;line-height:1.6;}
  .lock-input{
    width:100%;padding:13px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);
    font-family:'Noto Sans JP',sans-serif;font-size:18px;letter-spacing:0.3em;
    text-align:center;outline:none;transition:border-color .2s;margin-bottom:12px;
  }
  .lock-input:focus{border-color:var(--primary);}
  .lock-input.error{border-color:var(--error);animation:shake .3s ease;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .lock-btn{
    width:100%;padding:13px;border:none;border-radius:var(--radius-sm);
    background:linear-gradient(135deg,#3d7a5a,#6aa882);color:#fff;
    font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:600;cursor:pointer;
    box-shadow:0 3px 10px rgba(61,122,90,.3);transition:all .18s;
  }
  .lock-btn:hover{transform:translateY(-1px);}
  .lock-error{color:var(--error);font-size:12px;margin-top:8px;min-height:16px;}
  .lock-note{font-size:11px;color:var(--text-light);margin-top:14px;line-height:1.6;}

  /* ===== メイン画面（ロック解除後） ===== */
  #mainContent{display:none;}

  .header{background:linear-gradient(135deg,#1e4d35 0%,#3d7a5a 60%,#5a9070 100%);padding:22px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .header-left h1{font-family:'Noto Serif JP',serif;color:#fff;font-size:17px;font-weight:600;}
  .header-left p{color:rgba(255,255,255,.8);font-size:11.5px;margin-top:3px;}
  .header-right{display:flex;align-items:center;gap:8px;}
  .header-badge{display:inline-block;background:rgba(255,255,255,.15);color:#fff;font-size:10.5px;padding:3px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.25);white-space:nowrap;}
  .btn-lock{padding:5px 12px;border:1px solid rgba(255,255,255,.4);border-radius:20px;background:rgba(255,255,255,.1);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;}
  .btn-lock:hover{background:rgba(255,255,255,.2);}

  .container{max-width:900px;margin:0 auto;padding:20px 14px;}
  .toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
  .count-badge{background:var(--primary-pale);color:var(--accent);font-size:13px;font-weight:600;padding:6px 14px;border-radius:20px;border:1px solid #c0d8c8;}
  .btn-clear{padding:7px 14px;border:1.5px solid #d4968f;border-radius:var(--radius-sm);background:#fff5f5;color:var(--error);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
  .btn-clear:hover{background:#fde8e8;}

  .empty-state{background:var(--surface);border-radius:var(--radius);padding:50px 20px;text-align:center;box-shadow:var(--shadow);}
  .empty-icon{font-size:40px;margin-bottom:12px;}
  .empty-state h2{font-size:16px;color:var(--text-secondary);margin-bottom:6px;}
  .empty-state p{font-size:13px;color:var(--text-light);line-height:1.7;}

  .card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;border:1px solid var(--border);}
  .card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--primary-pale);border-bottom:1px solid #c8ddd0;cursor:pointer;user-select:none;}
  .card-header-left{display:flex;align-items:center;gap:10px;}
  .card-num{width:26px;height:26px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0;}
  .card-name{font-size:15px;font-weight:600;color:var(--accent);}
  .card-date{font-size:11.5px;color:var(--text-light);}
  .card-toggle{font-size:18px;color:var(--primary);transition:transform .2s;}
  .card-toggle.open{transform:rotate(180deg);}
  .card-body{padding:16px;display:none;}
  .card-body.open{display:block;}

  .sec{margin-bottom:16px;}
  .sec:last-child{margin-bottom:0;}
  .sec-label{font-size:11px;font-weight:700;color:var(--primary);letter-spacing:.06em;margin-bottom:8px;padding-bottom:4px;border-bottom:1.5px solid var(--primary-pale);}
  .row{display:grid;grid-template-columns:120px 1fr;gap:3px 10px;margin-bottom:5px;font-size:12.5px;align-items:start;}
  .rk{color:var(--text-light);font-weight:500;}
  .rv{color:var(--text);word-break:break-all;line-height:1.6;}
  .rv.empty{color:#bbb;font-style:italic;}
  .treat-item,.career-item{background:#f8f8f8;border:1px solid #e0e0e0;border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;}
  .treat-item:last-child,.career-item:last-child{margin-bottom:0;}
  .item-num{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:var(--primary);border-radius:50%;color:#fff;font-size:10px;font-weight:700;margin-right:6px;vertical-align:middle;}
  .btn-print{padding:6px 12px;border:1.5px solid var(--primary-light);border-radius:var(--radius-sm);background:var(--primary-pale);color:var(--accent);font-family:'Noto Sans JP',sans-serif;font-size:11.5px;font-weight:500;cursor:pointer;transition:all .15s;}
  .btn-print:hover{background:#d4ead8;}
  .btn-del{padding:5px 10px;border:1px solid #e0c0c0;border-radius:var(--radius-sm);background:#fff8f8;color:#b05050;font-family:'Noto Sans JP',sans-serif;font-size:11px;cursor:pointer;margin-left:6px;}
  .btn-del:hover{background:#fde8e8;}

  @media(max-width:480px){.row{grid-template-columns:90px 1fr;}.card-name{font-size:14px;}}
</style>
</head>
<body>

<!-- ===== ロック画面 ===== -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <h2>スタッフ専用ページ</h2>
    <p>このページはクリニックスタッフのみご利用いただけます。<br>暗証番号を入力してください。</p>
    <input class="lock-input" type="password" id="pinInput" maxlength="20" placeholder="パスワードを入力"
      onkeydown="if(event.key==='Enter') checkPin()" />
    <button class="lock-btn" onclick="checkPin()">ログイン</button>
    <div class="lock-error" id="lockError"></div>
    <div class="lock-note">※ 暗証番号はスタッフにお問い合わせください</div>
  </div>
</div>

<!-- ===== メイン（ロック解除後） ===== -->
<div id="mainContent">
  <div class="header">
    <div class="header-left">
      <h1>障害年金 事前回答 一覧</h1>
      <p>ひいらぎこころクリニック 小倉院｜スタッフ専用</p>
    </div>
    <div class="header-right">
      <span class="header-badge">スタッフ専用</span>
      <button class="btn-lock" onclick="lockScreen()">🔒 ロック</button>
    </div>
  </div>

  <div class="container">
    <div class="toolbar">
      <div class="count-badge" id="countBadge">読み込み中...</div>
      <button class="btn-clear" onclick="clearAll()">⚠ 全件削除</button>
    </div>
    <div id="listArea"></div>
  </div>
</div>

<script>
const KEY = 'nenkin_submissions_kokura';
const DOCTOR_KEY = 'nenkin_doctor_kokura';

function load() {
  try { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
  catch(e) { return []; }
}

function loadDoctor() {
  try { return JSON.parse(localStorage.getItem(DOCTOR_KEY) || '[]'); }
  catch(e) { return []; }
}

function save(data) {
  localStorage.setItem(KEY, JSON.stringify(data));
}

function fmt(v) {
  return v && v.trim() ? v : '<span class="rv empty">未入力</span>';
}

function fmtDate(iso) {
  try {
    const d = new Date(iso);
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  } catch(e) { return iso; }
}

const ADL_LABELS = ['適切な食事','身辺の清潔保持','金銭管理と買い物','通院と服薬','他人との意思伝達','身辺の安全保持','社会性'];

function buildCard(item, idx, total, docData) {
  const careers = (item.careers||[]).filter(c=>c.company||c.job);
  const treats = (item.treats||[]);

  const careerHtml = item.no_career==='職歴なし'
    ? '<div class="rv">職歴なし</div>'
    : (careers.length===0
      ? '<div class="rv empty">未入力</div>'
      : careers.map((c,i)=>`
        <div class="career-item">
          <span class="item-num">${i+1}</span><strong>${c.company||'—'}</strong>
          <div style="margin-top:5px">
            <div class="row"><span class="rk">業種・内容</span><span class="rv">${c.industry||'—'} / ${c.job||'—'}</span></div>
            <div class="row"><span class="rk">雇用形態</span><span class="rv">${c.type||'—'}</span></div>
            <div class="row"><span class="rk">在籍期間</span><span class="rv">${c.from||'—'} 〜 ${c.to||'—'}</span></div>
            <div class="row"><span class="rk">離職理由</span><span class="rv">${c.reason||'—'}</span></div>
          </div>
        </div>`).join(''));

  const treatHtml = treats.length===0
    ? '<div class="rv empty">未入力</div>'
    : treats.map((t,i)=>`
      <div class="treat-item">
        <span class="item-num">${i+1}</span><strong>${t.name}</strong>
        <div style="margin-top:5px">
          <div class="row"><span class="rk">治療期間</span><span class="rv">${t.from||'—'} 〜 ${t.to||'—'}</span></div>
          <div class="row"><span class="rk">病名</span><span class="rv">${t.diag||'—'}</span></div>
        </div>
      </div>`).join('');

  const n = total - idx;
  const receiptNum = item.receiptNum || '';
  const docLinked = docData ? true : false;
  const linkBadge = receiptNum
    ? (docLinked
        ? `<span style="background:#d4edda;color:#155724;font-size:10.5px;padding:2px 8px;border-radius:10px;font-weight:600;">✓ 医師入力あり</span>`
        : `<span style="background:#fff3cd;color:#856404;font-size:10.5px;padding:2px 8px;border-radius:10px;font-weight:600;">⏳ 医師入力待ち</span>`)
    : `<span style="background:#f8d7da;color:#721c24;font-size:10.5px;padding:2px 8px;border-radius:10px;font-weight:600;">番号なし</span>`;

  // 医師入力セクション
  const docSection = docData ? `
    <div class="sec" style="background:#f0f4f8;border-radius:6px;padding:12px;margin-bottom:8px;">
      <div class="sec-label" style="color:#1e3a5a;">🩺 医師入力（診察記録）</div>
      <div class="row"><span class="rk">主病名</span><span class="rv">${fmt(docData.main_diag)}</span></div>
      <div class="row"><span class="rk">既存障害</span><span class="rv">${docData.comorbid||'なし'}</span></div>
      <div class="row"><span class="rk">現症日</span><span class="rv">${fmt(docData.genshow_date)}</span></div>
      <div style="margin-top:8px;font-size:11.5px;font-weight:600;color:#1e3a5a;margin-bottom:4px;">日常生活能力の判定</div>
      ${ADL_LABELS.map((label,i)=>`<div class="row"><span class="rk" style="font-size:11px">${label}</span><span class="rv">${docData.adl?.[i]||'—'}</span></div>`).join('')}
      <div class="row" style="margin-top:4px;"><span class="rk">能力の程度</span><span class="rv">（${docData.adl_level||'—'}）</span></div>
      ${docData.doc_memo ? `<div class="row"><span class="rk">医師メモ</span><span class="rv">${docData.doc_memo}</span></div>` : ''}
    </div>` : `
    <div class="sec" style="background:#fff3cd;border-radius:6px;padding:12px;margin-bottom:8px;font-size:12.5px;color:#856404;">
      ⏳ 医師の診察記録がまだ入力されていません
    </div>`;

  return `
  <div class="card" id="card_${idx}">
    <div class="card-header" onclick="toggleCard(${idx})">
      <div class="card-header-left">
        <div class="card-num">${n}</div>
        <div>
          <div class="card-name">${item.name_kanji||'（氏名未入力）'}　<span style="font-size:12px;font-weight:400;color:var(--text-light)">${item.name_kana||''}</span></div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:3px;">
            ${receiptNum ? `<span style="font-size:11px;color:var(--text-light);font-family:monospace;">${receiptNum}</span>` : ''}
            ${linkBadge}
          </div>
          <div class="card-date">患者送信：${fmtDate(item.submittedAt)}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <button class="btn-print" onclick="event.stopPropagation();printCard(${idx})">🖨 印刷</button>
        <button class="btn-del" onclick="event.stopPropagation();deleteItem(${idx})">削除</button>
        <span class="card-toggle" id="toggle_${idx}">▼</span>
      </div>
    </div>
    <div class="card-body" id="body_${idx}">

      ${docSection}

      <div class="sec">
        <div class="sec-label">① 基本情報・確認</div>
        <div class="row"><span class="rk">氏名</span><span class="rv">${item.name_kanji||''} (${item.name_kana||''})</span></div>
        <div class="row"><span class="rk">診断書様式</span><span class="rv">${fmt(item.has_form)}</span></div>
        <div class="row"><span class="rk">参考書類</span><span class="rv">${fmt(item.has_docs)}</span></div>
      </div>

      <div class="sec">
        <div class="sec-label">② 現症日・初診情報</div>
        <div class="row"><span class="rk">現症日</span><span class="rv">${item.genshow_told==='日付を言われた' ? fmt(item.genshow_date) : '指定なし'}</span></div>
        <div class="row"><span class="rk">精神科初診医療機関</span><span class="rv">${fmt(item.first_clinic)}</span></div>
        <div class="row"><span class="rk">初診日</span><span class="rv">${fmt(item.first_visit_date)}</span></div>
        <div class="row"><span class="rk">その他メモ</span><span class="rv">${fmt(item.nenkin_memo)}</span></div>
      </div>

      <div class="sec">
        <div class="sec-label">③ 教育歴</div>
        <div class="row"><span class="rk">生育歴</span><span class="rv">${fmt(item.edu_infant)}</span></div>
        <div class="row"><span class="rk">小学校</span><span class="rv">${fmt(item.edu_primary)}</span></div>
        <div class="row"><span class="rk">中学校</span><span class="rv">${fmt(item.edu_middle)}</span></div>
        <div class="row"><span class="rk">高校</span><span class="rv">${fmt(item.edu_high)}</span></div>
        <div class="row"><span class="rk">最終学歴</span><span class="rv">${fmt(item.edu_final)}</span></div>
        <div class="row"><span class="rk">補足</span><span class="rv">${fmt(item.edu_note)}</span></div>
      </div>

      <div class="sec">
        <div class="sec-label">③ 職歴</div>
        ${careerHtml}
      </div>

      <div class="sec">
        <div class="sec-label">④ 治療歴</div>
        ${treatHtml}
      </div>

      <div class="sec">
        <div class="sec-label">⑤ 就労状況</div>
        <div class="row"><span class="rk">勤務先種別</span><span class="rv">${fmt(item.work_place)}</span></div>
        <div class="row"><span class="rk">雇用形態</span><span class="rv">${fmt(item.work_hire)}</span></div>
        <div class="row"><span class="rk">勤務年数</span><span class="rv">${item.work_years||'—'}年 ${item.work_months||'—'}ヶ月</span></div>
        <div class="row"><span class="rk">給与</span><span class="rv">${item.work_salary ? item.work_salary+'円' : '—'}</span></div>
        <div class="row"><span class="rk">頻度</span><span class="rv">週${item.work_days_week||'—'}日・月${item.work_days_month||'—'}日</span></div>
        <div class="row"><span class="rk">業務内容</span><span class="rv">${fmt(item.work_content)}</span></div>
        <div class="row"><span class="rk">援助状況</span><span class="rv">${fmt(item.work_support)}</span></div>
      </div>

      <div class="sec">
        <div class="sec-label">⑥ 日常生活状況</div>
        <div class="row"><span class="rk">生活環境</span><span class="rv">${fmt(item.living_env)}${item.facility_name?' / '+item.facility_name:''}</span></div>
        <div class="row"><span class="rk">同居者</span><span class="rv">${fmt(item.roommate)}${item.roommate_detail?' / '+item.roommate_detail:''}</span></div>
        <div class="row"><span class="rk">福祉サービス</span><span class="rv">${fmt(item.welfare_services)}</span></div>
      </div>

    </div>
  </div>`;
}

function toggleCard(idx) {
  const body = document.getElementById(`body_${idx}`);
  const tog = document.getElementById(`toggle_${idx}`);
  body.classList.toggle('open');
  tog.classList.toggle('open');
}

function deleteItem(idx) {
  const card = document.getElementById(`card_${idx}`);
  if(!card) return;
  // インライン確認UI
  const existing = card.querySelector('.del-confirm');
  if(existing) { existing.remove(); return; }
  const div = document.createElement('div');
  div.className = 'del-confirm';
  div.style.cssText = 'background:#fff5f5;border:1.5px solid #e0c0c0;border-radius:6px;padding:10px 14px;margin:10px 0 0;display:flex;align-items:center;justify-content:space-between;gap:10px;';
  div.innerHTML = `<span style="font-size:12.5px;color:#b03030;">本当に削除しますか？</span>
    <div style="display:flex;gap:8px;">
      <button onclick="execDelete(${idx})" style="padding:5px 14px;border:none;border-radius:5px;background:#b03030;color:#fff;font-size:12px;cursor:pointer;">削除する</button>
      <button onclick="this.closest('.del-confirm').remove()" style="padding:5px 12px;border:1.5px solid #ccc;border-radius:5px;background:#fff;font-size:12px;cursor:pointer;">キャンセル</button>
    </div>`;
  card.querySelector('.card-body').prepend(div);
  card.querySelector('.card-body').classList.add('open');
  document.getElementById(`toggle_${idx}`)?.classList.add('open');
}

function execDelete(idx) {
  const data = load();
  data.splice(idx, 1);
  save(data);
  render();
}

function clearAll() {
  const area = document.getElementById('listArea');
  const existing = document.getElementById('clearConfirm');
  if(existing) { existing.remove(); return; }
  const div = document.createElement('div');
  div.id = 'clearConfirm';
  div.style.cssText = 'background:#fff5f5;border:1.5px solid #e0c0c0;border-radius:8px;padding:14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;';
  div.innerHTML = `<span style="font-size:13px;color:#b03030;">全件削除します。元に戻せません。</span>
    <div style="display:flex;gap:8px;">
      <button onclick="localStorage.removeItem(KEY);render();" style="padding:6px 14px;border:none;border-radius:5px;background:#b03030;color:#fff;font-size:12px;cursor:pointer;">全件削除する</button>
      <button onclick="this.closest('#clearConfirm').remove()" style="padding:6px 12px;border:1.5px solid #ccc;border-radius:5px;background:#fff;font-size:12px;cursor:pointer;">キャンセル</button>
    </div>`;
  area.before(div);
}

function printCard(idx) {
  const data = load();
  const item = data[idx];
  if(!item) return;
  // シンプルな印刷用ウィンドウを開く
  const w = window.open('','_blank','width=700,height=900');
  const careers = (item.careers||[]).filter(c=>c.company||c.job);
  const treats = item.treats||[];
  w.document.write(`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
  <style>
    body{font-family:'Noto Sans CJK JP','Noto Sans JP',sans-serif;color:#111;padding:20px;font-size:12px;line-height:1.7;}
    h1{font-size:16px;border-bottom:2px solid #3d7a5a;padding-bottom:6px;margin-bottom:14px;color:#1e4d35;}

    @media print{@page{margin:14mm 12mm;}}
  </style></head><body>
  <h1>障害年金 事前確認フォーム回答内容</h1>
  <div class="sub-date">送信日時：${fmtDate(item.submittedAt)}</div>

  <h2>① 基本情報・確認</h2>
  <div class="row"><span class="k">氏名</span><span class="v">${item.name_kanji||''} (${item.name_kana||''})</span></div>
  <div class="row"><span class="k">診断書様式</span><span class="v">${item.has_form||'—'}</span></div>
  <div class="row"><span class="k">参考書類</span><span class="v">${item.has_docs||'—'}</span></div>

  <h2>② 現症日・初診情報</h2>

  <div class="row"><span class="k">精神科初診医療機関</span><span class="v">${item.first_clinic||'—'}</span></div>
  <div class="row"><span class="k">初診日</span><span class="v">${item.first_visit_date||'—'}</span></div>
  <div class="row"><span class="k">その他メモ</span><span class="v">${item.nenkin_memo||'—'}</span></div>

  <h2>③ 教育歴</h2>
  <div class="row"><span class="k">生育歴</span><span class="v">${item.edu_infant||'—'}</span></div>
  <div class="row"><span class="k">小学校</span><span class="v">${item.edu_primary||'—'}</span></div>
  <div class="row"><span class="k">中学校</span><span class="v">${item.edu_middle||'—'}</span></div>
  <div class="row"><span class="k">高校</span><span class="v">${item.edu_high||'—'}</span></div>
  <div class="row"><span class="k">最終学歴</span><span class="v">${item.edu_final||'—'}</span></div>
  <div class="row"><span class="k">補足</span><span class="v">${item.edu_note||'—'}</span></div>

  <h2>③ 職歴</h2>
  ${item.no_career==='職歴なし' ? '<div>職歴なし</div>' : careers.map((c,i)=>`
  <div class="item">
    <strong>${i+1}. ${c.company||'—'}</strong><br>
    業種：${c.industry||'—'} / 内容：${c.job||'—'}<br>
    雇用：${c.type||'—'} / 期間：${c.from||'—'} 〜 ${c.to||'—'}<br>
    離職理由：${c.reason||'—'}
  </div>`).join('')}

  <h2>④ 治療歴</h2>
  ${treats.map((t,i)=>`
  <div class="item">
    <strong>${i+1}. ${t.name}</strong><br>
    期間：${t.from||'—'} 〜 ${t.to||'—'}<br>
    病名：${t.diag||'—'}

  <h2>⑤ 就労状況</h2>
  <div class="row"><span class="k">勤務先種別</span><span class="v">${item.work_place||'—'}</span></div>
  <div class="row"><span class="k">雇用形態</span><span class="v">${item.work_hire||'—'}</span></div>
  <div class="row"><span class="k">勤務年数</span><span class="v">${item.work_years||'—'}年 ${item.work_months||'—'}ヶ月</span></div>
  <div class="row"><span class="k">給与</span><span class="v">${item.work_salary ? item.work_salary+'円' : '—'}</span></div>
  <div class="row"><span class="k">頻度</span><span class="v">週${item.work_days_week||'—'}日・月${item.work_days_month||'—'}日</span></div>
  <div class="row"><span class="k">業務内容</span><span class="v">${item.work_content||'—'}</span></div>
  <div class="row"><span class="k">援助状況</span><span class="v">${item.work_support||'—'}</span></div>

  <h2>⑥ 日常生活状況</h2>
  <div class="row"><span class="k">生活環境</span><span class="v">${item.living_env||'—'}${item.facility_name?' / '+item.facility_name:''}</span></div>
  <div class="row"><span class="k">同居者</span><span class="v">${item.roommate||'—'}${item.roommate_detail?' / '+item.roommate_detail:''}</span></div>
  <div class="row"><span class="k">福祉サービス</span><span class="v">${item.welfare_services||'—'}</span></div>

  <script>window.onload=()=>window.print();<\/script>
  </body></html>`);
  w.document.close();
}

function render() {
  const data = load();
  const doctorData = loadDoctor();
  const badge = document.getElementById('countBadge');
  const area = document.getElementById('listArea');
  badge.textContent = `患者回答：${data.length}件 ／ 医師入力：${doctorData.length}件`;
  if(data.length===0) {
    area.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <h2>回答がまだありません</h2>
      <p>患者さんがフォームを送信すると<br>こちらに一覧が表示されます。</p>
    </div>`;
    return;
  }
  // 受付番号で医師データとひも付け
  area.innerHTML = data.map((item, idx) => {
    const docData = item.receiptNum
      ? doctorData.find(d => d.receiptNum === item.receiptNum)
      : null;
    return buildCard(item, idx, data.length, docData);
  }).join('');
}

// ===== 認証 =====
// 暗証番号はここで変更できます（初期値: 1234）
const PIN = 'hrgkokura7455';
const SESSION_KEY = 'nenkin_admin_auth_kokura';

function checkPin() {
  const input = document.getElementById('pinInput');
  const val = input.value;
  if(val === PIN) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    render();
  } else {
    input.classList.add('error');
    document.getElementById('lockError').textContent = '暗証番号が違います。もう一度お試しください。';
    input.value = '';
    setTimeout(()=>input.classList.remove('error'), 500);
  }
}

function lockScreen() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('pinInput').value = '';
  document.getElementById('lockError').textContent = '';
}

// セッション中はすでに認証済みなら自動解除
if(sessionStorage.getItem(SESSION_KEY) === '1') {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
  render();
}
</script>
